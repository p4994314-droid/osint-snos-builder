name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev
          pip install buildozer cython
      - name: Build APK
        run: buildozer -v android debug
      - name: Send APK via Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          APK_PATH=$(ls bin/*.apk | head -n 1)
          curl -F "chat_id=$CHAT_ID" -F "document=@$APK_PATH" "https://api.telegram.org/bot$BOT_TOKEN/sendDocument"
